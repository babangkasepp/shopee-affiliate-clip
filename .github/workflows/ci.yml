name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      - name: Syntax check
        run: python -m compileall -q src
      - name: Import smoke test
        run: |
          python - <<'PY'
          import affclip
          from affclip import media, pipeline, providers
          print("affclip", affclip.__version__, "imports OK")
          PY
      - name: Offline media-engine test
        run: |
          python - <<'PY'
          import subprocess, os
          from affclip import media
          os.makedirs("ci_tmp", exist_ok=True)
          subprocess.run([media.FF,"-y","-f","lavfi","-i","color=c=navy:s=540x960:d=4","-r","24","ci_tmp/s.mp4"],check=True,capture_output=True)
          bg=media.make_backsound(media.video_duration("ci_tmp/s.mp4")+0.5,"ci_tmp/bg.wav",energy="viral")
          out=media.mux_audio("ci_tmp/s.mp4","ci_tmp/out.mp4",vo_wav=None,bg_wav=bg)
          info=subprocess.run([media.FF,"-i",out],capture_output=True,text=True).stderr
          assert "Audio:" in info
          print("media engine OK ->", out)
          PY
